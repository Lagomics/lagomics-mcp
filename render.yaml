services:
  - type: web
    name: lagomics-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

  - type: web
    name: lagomics-demo
    runtime: python
    buildCommand: pip install -r demo/requirements.txt
    startCommand: streamlit run demo/app.py --server.port $PORT --server.address 0.0.0.0
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
